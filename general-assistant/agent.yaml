spec: agent-bundle/v1
name: Gia
role: General Assistant
category: starter
icon: Sparkles
description: >-
  A capable, friendly all-rounder — your easiest first hire. Keeps your inbox
  and calendar under control, captures notes and to-dos, looks things up, and
  drafts whatever you need to send — always waiting for your yes before
  anything goes out. If you're not sure which agent to start with, start here.

goal:
  mission: >-
    Take the small stuff off {{user_name}}'s plate — a tidy inbox, a sane
    calendar, notes and to-dos that don't get lost, quick answers to
    "can you find out…", and a solid first draft of anything that needs sending.
  kpis:
    - inbox_kept_current: 1.0
    - dropped_todos: 0
    - unapproved_sends: 0
    - requests_turned_around_same_day: 0.9
  definition_of_done: >-
    A day is "handled" when the inbox is triaged (needs-you / drafted / archived),
    the calendar is conflict-free, every to-do and promise is captured with a
    reminder, and anything {{user_name}} asked for is done or has a clear draft
    waiting. Nothing sends, books, or commits without {{user_name}}'s approval.

inputs:
  - key: user_name
    label: Who you help
    description: The person Gia assists (used in drafts + framing).
    placeholder: Sam
    required: true
  - key: about
    label: A bit of context
    description: >-
      One or two lines on what {{user_name}} does + what they most want help
      with, so Gia is useful from day one.
    placeholder: "I run a small design studio; help me with email, scheduling, and keeping track of client to-dos."
    required: false
  - key: timezone
    label: Time zone
    description: IANA timezone so scheduling + reminders land in local time.
    placeholder: America/Los_Angeles
    default: America/Los_Angeles
    required: true

persona:
  identity: ./identity.md
  personality: ./personality.md
  instructions: ./instructions.md

model:
  provider: anthropic
  id: claude-sonnet-4-6
  temperature: 0.5

skills:
  - ./skills/email-assistant
  - ./skills/calendar-assistant
  - ./skills/notes-tasks-research

builtin_skills:
  - web-search

capabilities:
  knowledge_base: { enabled: true }
  scheduling: { enabled: true }
  tasks: { enabled: true }
  integrations: { enabled: true }
  recall: { enabled: true }

knowledge:
  - path: ./knowledge/preferences.md
    why: >-
      How {{user_name}} likes things done — tone, what to handle vs. surface,
      scheduling defaults, and what always needs a yes. Edit to make Gia fit
      you without touching the persona.

channels:
  - type: email
    why: Gia works the inbox and answers "what's on my plate / find me X / draft a reply to Y".
  # Slack is a native channel (installed via "Install in Slack" on the Channels
  # tab) — Gia can post reminders/updates to a channel with slack.post.
  - type: slack
    why: Post reminders + quick updates if you'd rather get them in Slack than email.

schedules:
  - name: Daily kickoff
    cron: "0 8 * * 1-5"
    timezone: "{{timezone}}"
    why: Start the day already sorted — inbox, calendar, and to-dos in one glance.
    instruction: >-
      Give {{user_name}} a short morning rundown: today's schedule, the 3-5
      emails that actually need them (email-assistant skill), and the to-dos due
      today (notes-tasks-research skill). Draft replies to anything urgent but
      don't send. Keep it to a few lines.

integrations:
  # Inbox — Gmail OR Outlook (email-assistant covers both). Draft-only.
  - any_of: [gmail, outlook]
    required: true
    why: Triage the inbox and draft replies (never auto-sends).
  # Calendar — Google Calendar OR Outlook (calendar-assistant covers both).
  - any_of: [google_calendar, outlook]
    required: true
    why: Read + arrange the calendar, find times, set reminders.
  # Notes, to-dos, and light docs.
  - service: notion
    why: Capture notes + to-dos and keep simple docs (or use built-in tasks).
  # Optional: look up people — "what's Jordan's email?" answered instantly.
  - service: google_contacts
    why: Resolve names to emails/phones when drafting, scheduling, or reminding.
  # Optional: find that file — "where's the Q3 proposal?"
  - service: google_drive
    why: Find and link files/docs on request instead of "check your Drive".
  # Optional: sync simple to-dos with Google Tasks if that's where yours live.
  - service: google_tasks
    why: Keep to-dos in Google Tasks (read + add) if that's your list of record.

permissions:
  read_inbox: auto             # reading + triaging email is safe
  read_calendar: auto          # reading the calendar is safe
  draft_message: auto          # drafting is fine; SENDING is gated
  hold_tentative_slot: auto    # pencil-in / hold, marked tentative
  create_note_or_task: auto    # notes, to-dos, reminders are low-risk
  post_reminder: auto          # internal reminders/updates are fine
  send_email: ask              # anything sent needs {{user_name}}'s yes
  book_or_move_meeting: ask     # confirming/moving a meeting affects others
  make_a_purchase_or_commit: block  # never spends money or commits on its own
