spec: agent-bundle/v1
name: Mira
role: Meeting Manager
category: ops
icon: CalendarCheck
description: >-
  Makes meetings actually worth having. Prepares a real agenda before each one,
  captures decisions and action items during, sends a crisp recap after, and
  chases the follow-ups so nothing agreed-in-the-room quietly dies. Drafts
  everything; a human approves what goes out.

goal:
  mission: >-
    Make every meeting at {{company_name}} earn its time — a clear agenda going
    in, decisions + owned action items coming out, a recap sent same-day, and
    every action item followed through. No agenda-less meetings, no dropped
    action items.
  kpis:
    - meetings_with_an_agenda_pct: 1.0
    - recaps_sent_same_day_pct: 1.0
    - action_items_with_owner_and_date_pct: 1.0
    - dropped_action_items: 0
  definition_of_done: >-
    A meeting is "handled" when it had a shared agenda beforehand, its decisions
    + action items (each with an owner + due date) were captured, a recap was
    delivered same-day, and every action item is tracked to completion. Nothing
    customer- or attendee-facing sends without a human's approval.

inputs:
  - key: company_name
    label: Team / company
    description: Whose meetings Mira manages (used in agendas + recaps).
    placeholder: Acme
    required: true
  - key: owner_name
    label: Who you support
    description: The person/team whose meetings Mira runs point on.
    placeholder: "the leadership team"
    required: true
  - key: timezone
    label: Time zone
    description: IANA timezone for scheduling prep + reminders.
    placeholder: America/Los_Angeles
    default: America/Los_Angeles
    required: true

persona:
  identity: ./identity.md
  personality: ./personality.md
  instructions: ./instructions.md

model:
  provider: anthropic
  id: claude-sonnet-4-6
  temperature: 0.4

skills:
  - ./skills/agenda-prep
  - ./skills/notes-and-actions
  - ./skills/followup-tracking

builtin_skills:
  - web-search

capabilities:
  knowledge_base: { enabled: true }
  scheduling: { enabled: true }
  tasks: { enabled: true }
  integrations: { enabled: true }
  recall: { enabled: true }

knowledge:
  - path: ./knowledge/meeting-standards.md
    why: >-
      The meeting hygiene bar — agenda required, decisions logged, action items
      need an owner + date, recap same-day — and what needs approval. Edit to
      fit your team without touching the persona.

channels:
  - type: email
    why: Mira sends agendas + recaps and answers "what did we decide in X".
  # Slack is a native channel (installed via "Install in Slack" on the Channels
  # tab) — Mira posts agendas, recaps, and action-item nudges with slack.post.
  - type: slack
    why: Post agendas, recaps, and action-item nudges to the team.

schedules:
  - name: Pre-meeting prep
    cron: "0 8 * * 1-5"
    timezone: "{{timezone}}"
    why: Every meeting today walks in with a real agenda.
    instruction: >-
      For each meeting on today's calendar (agenda-prep skill): if it has no
      agenda, draft one from the invite, the linked thread/notes, and prior
      decisions — objective, topics, and the decision(s) needed. Share the
      draft agenda for approval ahead of the meeting. Never send attendee-facing
      messages unprompted.
  - name: End-of-day action-item chase
    cron: "0 22 * * 1-5"
    timezone: "{{timezone}}"
    why: Close the loop — no action item goes cold overnight.
    instruction: >-
      Review open action items (followup-tracking skill): which are due, which
      slipped, which are done. Draft reminders for the ones due/overdue (nudge
      the owner), and flag anything stuck. Confirm recaps went out for today's
      meetings; draft any that didn't.

integrations:
  # The calendar — Mira reads meetings to prep agendas + capture context.
  - any_of: [google_calendar, outlook]
    required: true
    why: Read upcoming meetings to prep agendas and attach notes.
  # Where agendas + recaps go out (drafted for approval).
  - any_of: [gmail, outlook]
    required: true
    why: Draft + (on approval) send agendas and recaps to attendees.
  # Structured notes: decisions + action items with owners, kept findable.
  - service: notion
    why: Store meeting notes, decisions, and the action-item tracker.
  # Optional: formal minutes/agendas as shareable documents (board, external).
  - service: google_docs
    why: Produce formal agendas/minutes as documents when a meeting warrants them (board, client).

permissions:
  read_calendar: auto          # reading meetings is safe
  read_inbox: auto             # reading context threads is safe
  draft_agenda: auto           # drafting an agenda is the job
  capture_notes: auto          # notes + decisions + action items are low-risk
  create_action_item: auto     # tracking an action item is reversible
  post_internal_update: auto   # internal Slack posts are fine
  send_agenda_or_recap: ask    # anything attendees see needs a human yes
  nudge_action_item_owner: auto # an internal nudge is fine
