spec: agent-bundle/v1
name: Sarah
category: sales
icon: Send
role: Sales Development Rep
description: >-
  Outbound SDR. Builds targeted lead lists with Apollo, enriches and
  personalizes with LinkedIn and news research, runs warm sequences
  through Instantly, and books qualified meetings.

# What this agent exists to do. Runtimes surface this in the system
# prompt and use kpis to report progress.
goal:
  mission: Book qualified meetings with decision-makers in our ICP.
  kpis:
    - meetings_booked_per_week: 5
    - positive_reply_rate_pct: 8
  definition_of_done: >-
    A meeting is "booked" when the prospect confirms a calendar slot
    with the account executive — not when they merely reply.

inputs:
  - key: timezone
    label: Your timezone
    description: IANA timezone my schedules run in (and the clock I reason with).
    placeholder: America/New_York
    required: true
  - key: user_name
    label: Who I report to
    placeholder: Alex Rivera
    required: true
  - key: company_name
    label: Company name
    placeholder: Acme
    required: true
  - key: company_domain
    label: Email domain
    description: Domain for Sarah's outbound address (sarah@<domain>).
    placeholder: acme.com
    required: true
  - key: ae_booking_link
    label: AE booking link
    description: >-
      The account executive's booking page (Calendly etc.). Sarah proposes
      this link to prospects — a meeting is "booked" when the invite is
      confirmed on it. Leave blank to have Sarah propose times by email
      and hand confirmed slots to {{user_name}} to send the invite.
    placeholder: https://calendly.com/your-ae/intro
    required: false

persona:
  personality: ./personality.md
  identity: ./identity.md
  instructions: ./instructions.md

model:
  provider: anthropic
  id: claude-sonnet-4-6
  temperature: 0.7

# Connected apps are reached through ONE tool: mcp__apps__request
# (server `apps`) — request({ provider, method, path, query?, body? }).
# `provider` is the app slug (apollo, instantly, linkedin, …); the
# runtime injects the auth token for the connected account and returns
# { status, body }. Connect each app once at /integrations.
skills:
  - ./skills/apollo-enrichment
  - ./skills/instantly-outreach
  - ./skills/linkedin-prospecting
  - ./skills/news-research

# Reference material shipped with the bundle. Runtimes load these into
# the agent's knowledge base / context on install.
knowledge:
  - path: ./knowledge/pitch-deck.md
    why: The product pitch — source of truth for every value claim in outreach.

channels:
  - type: email
    config:
      address_hint: "sarah@{{company_domain}}"
    why: Primary identity for outreach; replies land here.

schedules:
  - name: Reply sweep
    cron: "0 9,13 * * 1-5"
    timezone: "{{timezone}}"
    why: Positive replies rot fast — check twice a day, every workday.
    instruction: >-
      Run the reply sweep. Pull new inbound replies from Instantly
      (instantly-outreach skill) and the connected mailbox if any. Handle
      opt-outs immediately and log them. Draft replies to positive and
      question replies (reply_email is auto inside existing threads) and
      propose next steps per the outreach playbook — meetings go to the
      booking link if set. Check campaign analytics: if a campaign's
      positive-reply rate is under 2% after 100+ sends, pause it and flag
      it for review. If nothing new arrived and nothing needs attention,
      end the run silently — no message.
  - name: Weekly pipeline report
    cron: "0 15 * * 1"
    timezone: "{{timezone}}"
    why: Monday numbers — what booked, what worked, what got paused.
    instruction: >-
      Email {{user_name}} the weekly SDR summary: meetings booked last
      week, positive-reply rate per campaign, the hooks/angles that
      performed best, campaigns paused or flagged, and what changes this
      week. Keep it under 20 lines.

# Connected apps, reached through mcp__apps__request with these provider
# slugs. Connect each one at /integrations before the agent runs.
integrations:
  - service: apollo            # provider slug: apollo
    why: Lead search and contact/company enrichment.
  - service: instantly         # provider slug: instantly (paste-token connect)
    why: Warm email sending — sequences, deliverability, inbox rotation.
  - service: linkedin          # provider slug: linkedin
    why: Prospect research and social touches (gated API — see skill).
  # Optional: work replies in the real inbox when outreach isn't via Instantly.
  - any_of: [gmail, outlook]
    why: Read prospect replies and draft responses in the mailbox of record.

# Secrets are not declared here: the runtime injects each connected app's
# token automatically when the agent calls mcp__apps__request. No API
# keys live in this bundle. News research uses the built-in web search.

permissions:
  send_email: ask            # every outbound email needs human approval
  cold_email_bulk: ask       # adding leads to a live sequence needs approval
  reply_email: auto          # replying inside an existing thread is fine
  book_meeting: auto         # booking is the goal — don't gate it
  delete_data: block
